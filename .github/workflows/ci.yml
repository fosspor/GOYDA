name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Vite dist for go:embed
        run: |
          cd frontend && npm ci && npm run build
          rm -rf ../internal/spa/dist && mkdir -p ../internal/spa/dist
          cp -R dist/. ../internal/spa/dist/
      - name: Mod tidy & build (embedded SPA)
        run: |
          go mod tidy
          go build -tags embed -o /tmp/server ./cmd/server

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint & build
        run: |
          npm ci
          npm run lint
          npm run build
