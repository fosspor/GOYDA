services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: goyda
      POSTGRES_PASSWORD: goyda
      POSTGRES_DB: goyda
    ports:
      - "5432:5432"
    volumes:
      - goyda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goyda -d goyda"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://goyda:goyda@db:5432/goyda?sslmode=disable
      JWT_SECRET: dev-change-me
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  goyda_pgdata:
